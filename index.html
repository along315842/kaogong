<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界你好</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            font-size: 4rem;
            color: #333;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease-out;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .flags {
            font-size: 3rem;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .description {
            font-size: 1.1rem;
            color: #888;
            line-height: 1.8;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>世界，你好！</h1>
        <p class="subtitle">Hello, World!</p>
        <div class="flags">
            🌍 🌏 🌎
        </div>
        <p class="description">
            欢迎来到这个美丽的世界！每一个角落都有独特的风景，
            每一个人都有自己的故事。让我们一起探索，一起成长，
            用爱和善意连接彼此。
        </p>
        <a href="#" class="btn">开始探索</a>
    </div>
    <footer>
        <p>Made with ❤️ for the World</p>
    </footer>
</body>
</html>
