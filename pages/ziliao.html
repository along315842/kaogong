        /* 页面顶部导航 */
        .page-navbar {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .page-navbar .nav-links {
            display: flex;
            gap: 20px;
        }
        
        .page-navbar .nav-links a {
            color: #333;
            text-decoration: none;
            font-size: 15px;

            font-size: 24px;
            cursor: pointer;
        }
        
        .page-navbar .mobile-menu {
            display: none;
        }
        
        /* 响应式 - 移动端 */
        @media (max-width: 768px) {
            .page-navbar .nav-links {
                display: none;
            }
            
            .page-navbar .menu-toggle {
                display: block;
            }
            
            .page-navbar .mobile-menu {

            }

                display: block;
                padding: 15px 20px;
                color: #333;
                text-decoration: none;
                border-bottom: 1px solid #f0f0f0;
            }
            
            .page-navbar .mobile-menu a:hover {
                background: #f5f7fa;
                color: #667eea;
            }
            
            .page-header-section {
                padding: 30px 0;
            }
        }
        
        /* 页面头部 */
        .page-header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 0;
            text-align: center;
        }
        
        .page-header-section h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }
        
        .page-header-section p {
            font-size: 20px;
            opacity: 0.9;
        }
        
        /* 资料分类标签 */
        .category-filter {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 40px 0 30px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 25px;
            background: white;
            border: 2px solid #4a90e2;
            color: #4a90e2;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: #4a90e2;
            color: white;
        }
        
        /* 资料卡片样式 */
        .ziliao-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border-left: 5px solid #4a90e2;
        }
        
        .ziliao-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            border-left-color: #764ba2;
        }
        
        /* 资料标题 */
        .ziliao-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 资料描述 */
        .ziliao-desc {
            color: #666;
            line-height: 1.8;
            margin-bottom: 15px;
            font-size: 15px;
        }
        
        /* 标签样式 */
        .ziliao-tag {
            display: inline-block;
            padding: 6px 15px;
            background: #e8f4fd;
            color: #4a90e2;
            border-radius: 15px;
            font-size: 13px;
            margin-bottom: 15px;
        }
        
        /* 下载按钮区域 */
        .download-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .download-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #4a90e2 0%, #667eea 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
        }
        
        /* 提取码样式 */
        .password-info {
            background: #fff3cd;
            padding: 10px 15px;
            border-radius: 8px;
            color: #856404;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 注意事项 */
        .notice-box {
            background: #f8f9fa;
            border-left: 4px solid #4a90e2;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
        }
        
        .notice-box h4 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .notice-box ul {
            color: #666;
            line-height: 2;
            padding-left: 20px;
        }
        
        .notice-box li {

        }
        
        /* 更新时间 */
        .update-time {
            color: #999;
            font-size: 13px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <section class="page-header-section">
            <div class="container">
                <h1>📀 备考资料下载</h1>

        <div class="container">
            <!-- 注意事项 -->

                    <li>点击「下载资料」按钮会跳转到网盘页面</li>
                    <li>部分资料需要输入提取码，提取码已在下方标注</li>
                    <li>如果链接失效，请联系管理员更新</li>

    <script src="../js/main.js"></script>
    
    <script>
        /**
         * 资料筛选功能
         * @param {string} category - 资料分类
         * 
         * 根据选择的分类筛选显示资料
         */
        function filterZiliao(category) {
            // 更新按钮状态
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // 筛选资料
            const container = document.getElementById('ziliaoList');
            
            if (category === 'all') {
                // 显示全部资料
                renderZiliao();
            } else {
                // 显示指定分类的资料
                const filtered = ziliaoData.filter(item => item.type === category);
                
                if (filtered.length === 0) {
                    container.innerHTML = '<div class="loading">该分类暂无资料</div>';
                    return;
                }
                
                let html = '';
                filtered.forEach(item => {
                    html += `
                        <div class="ziliao-card">
                            <div class="ziliao-title">📄 ${item.title}</div>
                            <span class="ziliao-tag">${item.type}</span>
                            <p class="ziliao-desc">${item.description}</p>
                            <div class="download-area">
                                <button class="download-btn" onclick="goToDownload('${item.downloadUrl}', '${item.password}')">
                                    📥 下载资料
                                </button>
                                ${item.password ? `<span class="password-info">🔑 提取码: ${item.password}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            }
        }
    </script>
    
    <!-- 移动端菜单控制 -->
    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const menuToggle = document.querySelector('.menu-toggle');
            
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
                menuToggle.innerHTML = '☰';
            } else {
                menu.style.display = 'block';
                menuToggle.innerHTML = '✕';
            }
        }
        
        // 点击外部关闭菜单
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('mobileMenu');
            const menuToggle = document.querySelector('.menu-toggle');
            
            if (menu.style.display === 'block' && 
                !menu.contains(event.target) && 
                !menuToggle.contains(event.target)) {
                menu.style.display = 'none';
                menuToggle.innerHTML = '☰';
            }
        });
        
        // 窗口大小改变时关闭菜单
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                const menu = document.getElementById('mobileMenu');
                const menuToggle = document.querySelector('.menu-toggle');
                menu.style.display = 'none';
                menuToggle.innerHTML = '☰';
            }
        });
    </script>
